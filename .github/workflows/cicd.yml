name: CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/unc-webapp-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/unc-webapp-frontend

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: UNIT TESTS — chạy với mọi push và PR
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "🧪 pytest"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      # app.py đọc client_secret.json khi import — tạo file mock để test không crash
      - name: Create mock client_secret.json
        run: |
          cat > backend/client_secret.json << 'EOF'
          {
            "web": {
              "client_id": "mock.apps.googleusercontent.com",
              "client_secret": "mock_secret",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "redirect_uris": ["http://localhost/auth/google/callback"]
            }
          }
          EOF

      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/test-results.xml


# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: BUILD & PUSH — chỉ chạy khi push lên main, sau khi test pass
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "🐳 Build & Push to GHCR"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Nếu có secret CLIENT_SECRET_JSON thì dùng thật, không thì dùng mock
      - name: Restore client_secret.json
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
        run: |
          if [ -n "$CLIENT_SECRET_JSON" ]; then
            echo "$CLIENT_SECRET_JSON" | base64 -d > backend/client_secret.json
          else
            cat > backend/client_secret.json << 'EOF'
          {
            "web": {
              "client_id": "mock.apps.googleusercontent.com",
              "client_secret": "mock_secret",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "redirect_uris": ["http://localhost/auth/google/callback"]
            }
          }
          EOF
          fi

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
