# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — UNC AutoBot
#
# Các job:
#  1. test    → Chạy pytest trên Python 3.10
#  2. build   → Build & push Docker images lên GitHub Container Registry (GHCR)
#  3. deploy  → SSH vào server và pull image mới, restart compose (optional)
#
# Secrets cần cấu hình trong GitHub → Settings → Secrets and variables → Actions:
#   CLIENT_SECRET_JSON  : Toàn bộ nội dung file client_secret.json (base64 encode)
#   FLASK_SECRET_KEY    : Chuỗi bí mật Flask
#   DEPLOY_HOST         : IP hoặc hostname của server deploy (SSH)
#   DEPLOY_USER         : Username SSH trên server
#   DEPLOY_SSH_KEY      : Private key SSH (PEM) để kết nối server
#   DEPLOY_PATH         : Đường dẫn thư mục dự án trên server (ví dụ: /opt/unc-webapp)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/unc-webapp-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/unc-webapp-frontend

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: UNIT TESTS
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      # Tạo file client_secret.json giả để app.py không crash khi import
      - name: Create mock client_secret.json
        run: |
          cat > backend/client_secret.json << 'EOF'
          {
            "web": {
              "client_id": "test_client_id.apps.googleusercontent.com",
              "client_secret": "test_client_secret",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "redirect_uris": ["http://localhost/auth/google/callback"]
            }
          }
          EOF

      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/test-results.xml


# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: BUILD & PUSH DOCKER IMAGES
# Chỉ chạy khi push lên main (không chạy với PR)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tạo client_secret.json thật từ Secret (base64 encoded)
      - name: Restore client_secret.json from secret
        run: |
          echo "${{ secrets.CLIENT_SECRET_JSON }}" | base64 -d > backend/client_secret.json

      # Tạo metadata tags: latest + commit SHA
      - name: Extract Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Extract Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: DEPLOY (SSH vào server, pull image mới, restart)
# Chỉ chạy khi build thành công.
# Bỏ comment khi bạn đã có server deploy thật sự.
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull images mới nhất từ GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_FRONTEND }}:latest

            # Restart stack với image mới
            docker compose down
            docker compose up -d --no-build

            # Dọn dẹp image cũ
            docker image prune -f

            echo "✅ Deployed successfully at $(date)"
