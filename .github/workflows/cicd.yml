# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — UNC AutoBot
#
# Job flow:
#  1. test    → Chạy 49 pytest cases (mọi push/PR)
#  2. build   → Build & push Docker images lên GHCR (chỉ khi push main)
#  3. deploy  → SSH vào server (chỉ chạy khi secret DEPLOY_HOST được cấu hình)
#
# Secrets cần cấu hình trong GitHub → Settings → Secrets and variables → Actions:
#   CLIENT_SECRET_JSON  : base64 encode của toàn bộ nội dung client_secret.json
#                         Tạo bằng: cat backend/client_secret.json | base64 | tr -d '\n'
#   FLASK_SECRET_KEY    : Chuỗi bí mật Flask production
#
#   [Tùy chọn - chỉ cần khi có server deploy thật]
#   DEPLOY_HOST         : IP hoặc hostname server (ví dụ: 123.45.67.89)
#   DEPLOY_USER         : Username SSH (ví dụ: ubuntu)
#   DEPLOY_SSH_KEY      : Private key SSH dạng PEM
#   DEPLOY_PATH         : Đường dẫn thư mục dự án trên server (ví dụ: /opt/unc-webapp)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Cho phép trigger deploy thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy to server (skip tests)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/unc-webapp-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/unc-webapp-frontend


# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: UNIT TESTS
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: "🧪 Unit Tests (pytest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      # Tạo mock client_secret.json — app.py cần file này khi import
      - name: Create mock client_secret.json
        run: |
          cat > backend/client_secret.json << 'EOF'
          {
            "web": {
              "client_id": "test_client_id.apps.googleusercontent.com",
              "client_secret": "test_client_secret",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "redirect_uris": ["http://localhost/auth/google/callback"]
            }
          }
          EOF

      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/test-results.xml


# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: BUILD & PUSH DOCKER IMAGES
# Chỉ chạy khi push lên main hoặc workflow_dispatch
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "🐳 Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta_backend.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Khôi phục client_secret.json từ secret (base64 encoded)
      # Nếu secret chưa được cấu hình, dùng mock để build không crash
      - name: Restore client_secret.json
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
        run: |
          if [ -n "$CLIENT_SECRET_JSON" ]; then
            echo "$CLIENT_SECRET_JSON" | base64 -d > backend/client_secret.json
            echo "✅ Restored real client_secret.json from secret"
          else
            echo "⚠️  Secret CLIENT_SECRET_JSON not set, using mock for build"
            cat > backend/client_secret.json << 'EOF'
          {
            "web": {
              "client_id": "mock_client_id.apps.googleusercontent.com",
              "client_secret": "mock_client_secret",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "redirect_uris": ["http://localhost/auth/google/callback"]
            }
          }
          EOF
          fi

      - name: Extract Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Extract Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: DEPLOY — Tự động skip nếu chưa cấu hình secrets SSH
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to Server"
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      # Kiểm tra xem secrets SSH đã được cấu hình chưa
      - name: Check deployment secrets
        id: check_secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️  DEPLOY_HOST secret not configured — skipping deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Deployment secrets found — proceeding with deploy"
          fi

      - name: Deploy via SSH
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e

            # Chuyển tới thư mục dự án
            cd "${{ secrets.DEPLOY_PATH }}"

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull images mới
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_FRONTEND }}:latest

            # Cập nhật docker-compose.yml để dùng image từ GHCR thay vì build local
            # (File compose trên server cần có image: ghcr.io/... thay vì build: ...)
            docker compose down --remove-orphans
            docker compose up -d --no-build

            # Dọn dẹp image cũ để tiết kiệm dung lượng
            docker image prune -f

            echo "✅ Deployed successfully — $(date)"

      - name: Skip notice
        if: steps.check_secrets.outputs.skip == 'true'
        run: |
          echo "ℹ️  Deploy job skipped: DEPLOY_HOST secret is not configured."
          echo "ℹ️  To enable deployment, add these secrets in GitHub → Settings → Secrets:"
          echo "     - DEPLOY_HOST"
          echo "     - DEPLOY_USER"
          echo "     - DEPLOY_SSH_KEY"
          echo "     - DEPLOY_PATH"
