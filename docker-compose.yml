services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: unc_backend
    volumes:
      # Mount toàn bộ mã nguồn backend và templates để phát triển local (live reload)
      - ./backend:/app/backend
      - ./frontend/templates:/app/frontend/templates
    environment:
      - FLASK_DEBUG=0
      - PYTHONIOENCODING=utf-8
      # Bảo mật: đọc từ file .env ở thư mục gốc (đã .gitignore). Xem .env.example.
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - DEMO_MODE=${DEMO_MODE:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost/auth/google/callback}
      - SESSION_FILE_DIR=/tmp/unc_flask_session
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: unc_frontend
    ports:
      - "80:80"
    volumes:
      # Mount thư mục static để Nginx cập nhật file CSS/JS ngay lập tức khi chỉnh sửa
      - ./frontend/static:/usr/share/nginx/html/static
    depends_on:
      - backend
    restart: unless-stopped
