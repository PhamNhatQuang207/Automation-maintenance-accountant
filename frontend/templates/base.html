<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNC AutoBot — BQT Park Hill 1</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <nav>
        <div class="brand">UNC AutoBot</div>
        {% if session.get('user') %}
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Xử lý hồ sơ</a>
            <a href="{{ url_for('settings') }}">Cấu hình</a>
            <div class="user-profile">
                <img src="{{ session['user']['picture'] }}" alt="">
                <span>{{ session['user']['name'] }}</span>
                <a href="{{ url_for('logout') }}" style="margin-left:4px; color:var(--text-muted);"><i data-feather="log-out" style="width:15px;height:15px;"></i></a>
            </div>
        </div>
        {% endif %}
    </nav>

    {% block content %}{% endblock %}

    <div id="loader">
        <div class="spinner"></div>
        <p>Đang xử lý hồ sơ…</p>
    </div>

    <script>feather.replace();</script>
    {% block scripts %}{% endblock %}
</body>
</html>
