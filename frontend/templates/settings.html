{% extends "base.html" %}
{% block content %}
<div class="dashboard-container">
    <h2>Cấu Hình Hệ Thống</h2>
    <p style="color: var(--text-muted); margin-bottom: 24px;">Thiết lập khóa API cá nhân của bạn để sử dụng tính năng trích xuất dữ liệu.</p>

    <div class="glass-panel" style="max-width: 600px;">
        {% if success %}
        <div class="alert alert-success">
            <i data-feather="check-circle"></i> Đã lưu cấu hình thành công!
        </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('settings') }}">
            <div class="form-group">
                <label>Nhà cung cấp AI (OCR Model)</label>
                <select class="form-control" name="ocr_provider" style="background: rgba(0,0,0,0.5);">
                    <option value="gemini" {% if ocr_provider == 'gemini' %}selected{% endif %}>Google Gemini (1.5 Pro / Flash)</option>
                    <option value="openai" {% if ocr_provider == 'openai' %}selected{% endif %}>OpenAI (GPT-4o)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" class="form-control" name="api_key" value="{{ api_key }}" placeholder="Nhập API Key của bạn..." required>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">
                    * API Key được lưu an toàn trên phiên làm việc (Session) của bạn.
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary"><i data-feather="save"></i> Lưu cấu hình</button>
        </form>
    </div>
</div>
{% endblock %}
