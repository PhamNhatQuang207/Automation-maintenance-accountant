{% extends "base.html" %}
{% block content %}
<div class="dashboard-container">
    <h2>Cấu hình</h2>
    <p style="color: var(--text-secondary); margin-top: 4px; font-size: 13px;">Thiết lập khóa API cho dịch vụ trích xuất dữ liệu.</p>

    <div class="glass-panel" style="max-width: 480px; margin-top: 16px;">
        {% if success %}
        <div class="alert alert-success" style="margin-bottom: 16px;">
            <i data-feather="check-circle"></i> Đã lưu.
        </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('settings') }}">
            <div class="form-group">
                <label>Nhà cung cấp AI</label>
                <select class="form-control" name="ocr_provider">
                    <option value="gemini" {% if ocr_provider == 'gemini' %}selected{% endif %}>Google Gemini 2.5 Flash</option>
                    <option value="openai" {% if ocr_provider == 'openai' %}selected{% endif %}>OpenAI GPT-4o</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" class="form-control" name="api_key" value="{{ api_key }}" placeholder="Nhập API Key…" required>
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
                    Key được lưu trong phiên làm việc (session) của bạn.
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary"><i data-feather="save" style="width:14px;height:14px;"></i> Lưu</button>
        </form>
    </div>
</div>
{% endblock %}
